# ─────────────────────────────────────────────────────────────────────────────
# Codemagic CI/CD — build & publish Siddur Am Israel to the Apple App Store.
# This lets you ship from Windows: the build runs on Codemagic's macOS machines.
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
#
# ┌─ ONE-TIME SETUP IN THE CODEMAGIC UI (before the first build) ──────────────┐
# │ 1. Connect this repo (github.com/IsraelCIL/SiddurAmIsrael).                 │
# │ 2. Add your App Store Connect API key:                                      │
# │      Codemagic → Teams/User settings → Integrations → App Store Connect.    │
# │    Name the integration EXACTLY:  SmartSiddur_ASC                           │
# │    (paste Issuer ID, Key ID, and upload the .p8 file).                      │
# │ 3. Confirm BUNDLE_ID below matches the App ID you register in              │
# │    App Store Connect (com.sidduramisrael.app).                              │
# └─────────────────────────────────────────────────────────────────────────────┘
# ─────────────────────────────────────────────────────────────────────────────

workflows:
  ios-app-store:
    name: iOS — App Store
    instance_type: mac_mini_m2
    max_build_duration: 90

    integrations:
      # Must match the integration name you create in the Codemagic UI.
      app_store_connect: SmartSiddur_ASC

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sidduramisrael.app   # ← keep in sync with BUNDLE_ID below
      vars:
        BUNDLE_ID: "com.sidduramisrael.app"       # ← MUST match the App ID in App Store Connect
        APP_DISPLAY_NAME: "Siddur Am Israel"      # home-screen name
      flutter: 3.41.9        # matches README.md; change to "stable" if this exact version is unavailable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Generate iOS platform files
        script: |
          set -e
          # The repo has no ios/ folder — generate the native iOS scaffolding.
          flutter create --project-name smart_siddur --platforms=ios .

      - name: Configure bundle id, app name, Hebrew localization & encryption flag
        script: |
          set -e
          # Set the bundle identifier on the Runner target (skip the RunnerTests lines).
          sed -i '' -E "/RunnerTests/!s/PRODUCT_BUNDLE_IDENTIFIER = [^;]+;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" ios/Runner.xcodeproj/project.pbxproj

          PLIST=ios/Runner/Info.plist
          # Home-screen display name
          plutil -replace CFBundleDisplayName -string "$APP_DISPLAY_NAME" "$PLIST" 2>/dev/null \
            || plutil -insert CFBundleDisplayName -string "$APP_DISPLAY_NAME" "$PLIST"
          # Hebrew-first localization (drives RTL + store language)
          plutil -replace CFBundleDevelopmentRegion -string "he" "$PLIST"
          plutil -insert CFBundleLocalizations -json '["he","en"]' "$PLIST" 2>/dev/null \
            || plutil -replace CFBundleLocalizations -json '["he","en"]' "$PLIST"
          # App uses no non-exempt encryption (offline siddur) — avoids the manual
          # export-compliance prompt on every TestFlight build.
          plutil -replace ITSAppUsesNonExemptEncryption -bool false "$PLIST" 2>/dev/null \
            || plutil -insert ITSAppUsesNonExemptEncryption -bool false "$PLIST"

      - name: Add privacy manifest (declares zero data collection)
        script: |
          set -e
          cp ci/PrivacyInfo.xcprivacy ios/Runner/PrivacyInfo.xcprivacy
          gem install xcodeproj --no-document
          ruby ci/add_privacy_manifest.rb

      - name: Install Dart/Flutter packages
        script: |
          set -e
          flutter pub get

      - name: Generate app launcher icons
        script: |
          set -e
          # Reads assets/icon/app_icon.png (1024×1024, no alpha) → writes iOS icon set.
          dart run flutter_launcher_icons

      - name: Generate code (freezed / riverpod / json_serializable)
        script: |
          set -e
          # *.freezed.dart / *.g.dart are git-ignored, so they must be generated here.
          dart run build_runner build --delete-conflicting-outputs

      - name: Static analysis & tests
        script: |
          set -e
          flutter analyze
          flutter test
          # ↑ Remove this step to save build minutes once you trust the pipeline.

      - name: Set up iOS code signing (automatic, via API key)
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          set -e
          # Build name comes from pubspec (1.0.0); build number = Codemagic build index.
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        # Uploads to TestFlight automatically. Leave App Store submission manual
        # for the first release so you can fill in metadata & screenshots first.
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - israel9390@gmail.com
        notify:
          success: true
          failure: true
