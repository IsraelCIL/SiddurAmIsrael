# ─────────────────────────────────────────────────────────────────────────────
# Codemagic CI/CD — build & publish Siddur Am Israel to the Apple App Store.
# Builds on Codemagic's macOS machines, so you can ship from Windows.
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
#
# The repo now contains a committed ios/ project, so this pipeline uses it
# directly (no `flutter create`). Bundle id, app name, localized name, and the
# privacy manifest are all configured in the repo (ios/ + ci/configure_ios.rb).
#
# ┌─ ONE-TIME SETUP IN THE CODEMAGIC UI (before the first build) ──────────────┐
# │ 1. Connect this repo (github.com/IsraelCIL/SiddurAmIsrael).                 │
# │ 2. Add your App Store Connect API key:                                      │
# │      Codemagic → Teams/User settings → Integrations → App Store Connect.    │
# │    Name the integration EXACTLY:  SmartSiddur_ASC                           │
# │ 3. App Store Connect app must use Bundle ID  com.sidduramisrael.app         │
# │ 4. Build the `main` branch with the "iOS — App Store" workflow below.       │
# └─────────────────────────────────────────────────────────────────────────────┘
# ─────────────────────────────────────────────────────────────────────────────

workflows:
  ios-app-store:
    name: iOS — App Store
    instance_type: mac_mini_m2
    max_build_duration: 90

    integrations:
      # Must match the integration name you create in the Codemagic UI.
      app_store_connect: SmartSiddur_ASC

    environment:
      groups:
        # Codemagic variable group that must contain CERTIFICATE_PRIVATE_KEY
        # (a secure RSA PEM private key — see docs/IOS_APP_STORE.md).
        - ios_signing
      vars:
        BUNDLE_ID: "com.sidduramisrael.app"   # ← must match the committed ios/ project + App Store Connect
      flutter: 3.41.9        # matches README.md; change to "stable" if this exact version is unavailable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install Dart/Flutter packages
        script: |
          set -e
          flutter pub get

      - name: Register iOS app resources (privacy manifest + localized name)
        script: |
          set -e
          # Wires ios/Runner/PrivacyInfo.xcprivacy and the en/he InfoPlist.strings
          # (localized home-screen name) into the Xcode project so they're bundled.
          gem install xcodeproj --no-document
          ruby ci/configure_ios.rb

      - name: Generate code (freezed / riverpod / json_serializable)
        script: |
          set -e
          # *.freezed.dart / *.g.dart are git-ignored, so they must be generated here.
          dart run build_runner build --delete-conflicting-outputs

      - name: Static analysis & tests (report-only, non-blocking)
        script: |
          # Report analyzer + test results for visibility, but DON'T block the
          # release build on pre-existing lints/warnings. Genuine compile errors
          # still fail the "Build signed IPA" step below.
          # Clean up the lints separately with: dart fix --apply
          flutter analyze --no-fatal-infos --no-fatal-warnings || true
          flutter test || true

      - name: Set up iOS code signing (automatic, via API key)
        script: |
          set -e
          keychain initialize
          # --certificate-key is REQUIRED for --create to generate/own the iOS
          # distribution certificate. CERTIFICATE_PRIVATE_KEY = secure RSA PEM
          # env var (in the ios_signing group). On later builds the same key
          # re-fetches the same certificate.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          set -e
          # Build name comes from pubspec (1.0.0); build number = Codemagic build index.
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        # Uploads to TestFlight automatically. Leave App Store submission manual
        # for the first release so you can fill in metadata & screenshots first.
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - israel9390@gmail.com
        notify:
          success: true
          failure: true
