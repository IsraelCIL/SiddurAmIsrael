name: siddur_am_israel_chai
description: סידור עם ישראל — אפליקציית תפילה חכמה לאייפון
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

# ─────────────────────────────────────────────────────────────────────────────
# RUNTIME DEPENDENCIES
# Install all with: flutter pub get
# ─────────────────────────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (Riverpod)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Immutable models & JSON
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Typography — Hebrew-optimised font with full nikud support
  google_fonts: ^6.2.0

  # Local persistence (nusach, settings)
  shared_preferences: ^2.3.3

  # Internationalization / Hebrew date formatting
  intl: ^0.20.0

  # Hebrew / Jewish calendar calculations (offline-first)
  kosher_dart: ^2.0.19

  # Open email / URLs from the app
  url_launcher: ^6.3.0

# ─────────────────────────────────────────────────────────────────────────────
# DEV / BUILD-TIME DEPENDENCIES
# Code generation: dart run build_runner build --delete-conflicting-outputs
# ─────────────────────────────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Launcher Icons Generator (Added for the logo)
  flutter_launcher_icons: ^0.13.1

  # Riverpod code generation
  riverpod_generator: ^2.6.2

  # Freezed + JSON code generation
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Build runner (drives all code generation above)
  build_runner: ^2.4.13

  # Testing utilities
  mocktail: ^1.0.4

# ─────────────────────────────────────────────────────────────────────────────
# FLUTTER ASSET DECLARATIONS
# ─────────────────────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true
  assets:
    - assets/prayers/_manifest.json
    - assets/prayers/templates/
    - assets/prayers/templates/shacharit/
    - assets/prayers/templates/musaf/
    - assets/prayers/templates/maariv/

    # Common (haftarah blessings, shared cross-service segments)
    - assets/prayers/common/haftarah/

    # Shacharit
    - assets/prayers/shacharit/lifnei_hatfila/common/
    - assets/prayers/shacharit/lifnei_hatfila/nusach/ashkenaz/
    - assets/prayers/shacharit/lifnei_hatfila/nusach/sfard/
    - assets/prayers/shacharit/lifnei_hatfila/nusach/edot_mizrach/
