name: smart_siddur
description: Smart Siddur — Offline-first Hebrew prayer app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

# ─────────────────────────────────────────────────────────────────────────────
# RUNTIME DEPENDENCIES
# Install all with: flutter pub get
# ─────────────────────────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter

  # State management (Riverpod)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Immutable models & JSON
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Networking (Hebcal API)
  dio: ^5.7.0

  # Local persistence (nusach, settings)
  shared_preferences: ^2.3.3

  # Navigation
  go_router: ^14.6.2

  # Internationalization / Hebrew date formatting
  intl: ^0.19.0

# ─────────────────────────────────────────────────────────────────────────────
# DEV / BUILD-TIME DEPENDENCIES
# Code generation: dart run build_runner build --delete-conflicting-outputs
# ─────────────────────────────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Riverpod code generation
  riverpod_generator: ^2.6.2

  # Freezed + JSON code generation
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Build runner (drives all code generation above)
  build_runner: ^2.4.13

  # Testing utilities
  mocktail: ^1.0.4

# ─────────────────────────────────────────────────────────────────────────────
# FLUTTER ASSET DECLARATIONS
# ─────────────────────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true
  assets:
    - assets/prayers/templates/
    - assets/prayers/segments/
    - assets/prayers/nusach/ashkenaz/
    - assets/prayers/nusach/sfard/
    - assets/prayers/nusach/edot_mizrach/
    - assets/prayers/nusach/chabad/
