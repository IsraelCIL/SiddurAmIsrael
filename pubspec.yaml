name: smart_siddur
description: Smart Siddur — Offline-first Hebrew prayer app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

# ─────────────────────────────────────────────────────────────────────────────
# RUNTIME DEPENDENCIES
# Install all with: flutter pub get
# ─────────────────────────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (Riverpod)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Immutable models & JSON
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local persistence (nusach, settings)
  shared_preferences: ^2.3.3

  # Internationalization / Hebrew date formatting
  intl: ^0.20.0

  # Hebrew / Jewish calendar calculations (offline-first)
  kosher_dart: ^2.0.19

# ─────────────────────────────────────────────────────────────────────────────
# DEV / BUILD-TIME DEPENDENCIES
# Code generation: dart run build_runner build --delete-conflicting-outputs
# ─────────────────────────────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Riverpod code generation
  riverpod_generator: ^2.6.2

  # Freezed + JSON code generation
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Build runner (drives all code generation above)
  build_runner: ^2.4.13

  # Testing utilities
  mocktail: ^1.0.4

  # iOS/Android app launcher icon generation (run: dart run flutter_launcher_icons)
  flutter_launcher_icons: ^0.14.1

# ─────────────────────────────────────────────────────────────────────────────
# FLUTTER ASSET DECLARATIONS
# ─────────────────────────────────────────────────────────────────────────────
# ─────────────────────────────────────────────────────────────────────────────
# APP LAUNCHER ICON
# Source image: assets/icon/app_icon.png (1024×1024, opaque PNG — see its README).
# Regenerate with: dart run flutter_launcher_icons
# ─────────────────────────────────────────────────────────────────────────────
flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true   # Apple rejects icons with transparency

flutter:
  uses-material-design: true
  assets:
    - assets/prayers/_manifest.json
    - assets/prayers/templates/
    - assets/prayers/templates/shacharit/
    - assets/prayers/templates/musaf/
    - assets/prayers/templates/maariv/

