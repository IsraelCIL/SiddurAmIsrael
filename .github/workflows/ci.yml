name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (freezed / riverpod / json)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        # 36 pre-existing info/warning lints on main (freezed false-positives,
        # style nits) — fail only on errors until they are cleaned up.
        run: flutter analyze --no-pub --no-fatal-warnings --no-fatal-infos

      - name: Run tests
        run: flutter test --no-pub --reporter expanded
