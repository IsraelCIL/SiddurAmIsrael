include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # The Sefaria importer is a standalone dev tool with its own pubspec/package
    # (it depends on package:test). It is analyzed & tested on its own, not as
    # part of the app build — so keep it out of the app's analysis context.
    - tools/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    missing_required_param: error
    missing_return: error
    must_be_immutable: error

linter:
  rules:
    # Style
    - prefer_single_quotes
    - always_use_package_imports
    - directives_ordering
    - sort_constructors_first

    # Safety
    - avoid_dynamic_calls
    - avoid_print
    - cancel_subscriptions
    - close_sinks

    # Clean architecture
    - prefer_final_locals
    - prefer_final_fields
